<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TeQoin Faucet</title>
  <meta name="description" content="Claim TeQoin L2 testnet tokens – ETH, USDT, USDC & DAI – directly to your wallet.">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Telegram Mini Apps SDK (version 59) -->
  <script src="https://telegram.org/js/telegram-web-app.js?59"></script>

  <style>
    /* ─── Google Font ─────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

    /* ─── Brand Tokens ────────────────────────────────── */
    :root {
      /* TeQoin Official Palette */
      --tq-bg: #0242c1;
      --tq-surface: rgba(20, 30, 53, 0.7);
      /* Glass card background */
      --tq-surface-2: rgba(14, 22, 40, 0.75);
      --tq-border: rgba(98, 140, 235, 0.4);
      --tq-border-glow: rgba(255, 190, 38, 0.35);
      --tq-text: #ffffff;
      --tq-muted: #c2d1e1;
      --tq-accent: #ffbe26;
      /* Official Yellow */
      --tq-accent-2: #0153fd;
      /* Official Blue */
      --tq-grad: linear-gradient(135deg, #0153fd 0%, #ffbe26 100%);
      --tq-grad-glow: linear-gradient(135deg, rgba(1, 83, 253, 0.2) 0%, rgba(255, 190, 38, 0.2) 100%);
      --tq-success: #49ff98;
      --tq-error: #ff3b30;
      --tq-radius: 16px;
      --tq-radius-sm: 11px;
      --tq-font: 'Outfit', sans-serif;

      /* Token brand colors */
      --eth-color: #8B8EFF;
      --usdt-color: #26A17B;
      --usdc-color: #2775CA;
      --dai-color: #FBCC5F;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif !important;
    }

    html {
      height: 100%;
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    html::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }

    body {
      font-family: var(--tq-font);
      background: var(--tq-bg);
      color: var(--tq-text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    body::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 0%, rgba(47, 140, 255, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 90% 100%, rgba(1, 83, 253, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 0 auto;
      padding: 20px 16px 24px;
      min-height: 100%;
    }

    /* ─── Header ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-top: env(safe-area-inset-top, 0px);
    }

    .logo-wrap {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--tq-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #040A0C;
      font-size: 20px;
      letter-spacing: -0.02em;
      box-shadow: 0 0 20px rgba(23, 227, 196, 0.3);
    }

    .logo-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 14px;
      display: none;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      background: var(--tq-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text .subtitle {
      font-size: 12px;
      color: var(--tq-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    .header-badge {
      margin-left: auto;
      background: var(--tq-grad-glow);
      border: 1px solid var(--tq-border-glow);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--tq-accent);
      white-space: nowrap;
    }

    /* ─── Cards ───────────────────────────────────────── */
    .card {
      background: var(--tq-surface);
      border: 1px solid var(--tq-border);
      border-radius: var(--tq-radius);
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(23, 227, 196, 0.3), transparent);
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tq-muted);
      margin-bottom: 14px;
    }

    /* ─── Wallet Input ────────────────────────────────── */
    .address-wrap {
      position: relative;
    }

    .address-input {
      width: 100%;
      padding: 13px 46px 13px 14px;
      border-radius: var(--tq-radius-sm);
      background: var(--tq-surface-2);
      border: 1.5px solid var(--tq-border);
      color: var(--tq-text);
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .address-input::placeholder {
      color: var(--tq-muted);
    }

    .address-input:focus {
      border-color: var(--tq-accent);
      box-shadow: 0 0 0 3px rgba(23, 227, 196, 0.12);
    }

    .address-input.invalid {
      border-color: var(--tq-error);
      box-shadow: 0 0 0 3px rgba(255, 92, 92, 0.12);
    }

    .paste-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--tq-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .paste-btn:hover {
      color: var(--tq-accent);
    }

    .hint {
      font-size: 12px;
      color: var(--tq-muted);
      margin-top: 8px;
      min-height: 18px;
      line-height: 1.4;
      transition: color 0.2s;
    }

    .hint.error {
      color: var(--tq-error);
    }

    .hint.success {
      color: var(--tq-success);
    }

    .detect-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: var(--tq-radius-sm);
      background: var(--tq-surface-2);
      border: 1.5px solid var(--tq-border);
      color: var(--tq-text);
      font-family: var(--tq-font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .detect-btn:hover {
      border-color: var(--tq-accent);
      background: rgba(23, 227, 196, 0.05);
    }

    .detect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .detect-btn svg {
      flex-shrink: 0;
    }

    /* ─── Mode Toggle ────────────────────────────────── */
    .toggle-wrap {
      display: flex;
      background: var(--tq-surface-2);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 10px;
      border-radius: 999px;
      background: transparent;
      border: none;
      color: var(--tq-muted);
      font-family: var(--tq-font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: var(--tq-grad);
      color: #040A0C;
      box-shadow: 0 2px 10px rgba(23, 227, 196, 0.25);
    }

    /* ─── Token Grid ─────────────────────────────────── */
    .token-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .token-card {
      border-radius: var(--tq-radius-sm);
      padding: 14px;
      border: 1.5px solid var(--tq-border);
      background: var(--tq-surface-2);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .token-card.active {
      border-color: var(--token-color, var(--tq-accent));
      background: color-mix(in srgb, var(--token-color, var(--tq-accent)) 8%, var(--tq-surface-2));
      box-shadow: 0 0 14px color-mix(in srgb, var(--token-color, var(--tq-accent)) 20%, transparent);
    }

    .token-card.inactive {
      opacity: 0.35;
      filter: grayscale(0.6);
    }

    .token-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--token-color, #fff) 18%, transparent);
      color: var(--token-color, #fff);
      border: 1.5px solid color-mix(in srgb, var(--token-color, #fff) 35%, transparent);
    }

    .token-info .token-sym {
      font-size: 14px;
      font-weight: 700;
      color: var(--tq-text);
      line-height: 1.2;
    }

    .token-info .token-amt {
      font-size: 11px;
      font-weight: 600;
      color: var(--token-color, var(--tq-muted));
      margin-top: 2px;
    }

    .token-card.inactive .token-info .token-amt {
      color: var(--tq-muted);
    }

    /* ─── Claim Button ───────────────────────────────── */
    .claim-btn {
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      background: var(--tq-grad);
      border: none;
      color: #040A0C;
      font-family: var(--tq-font);
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 20px rgba(23, 227, 196, 0.3);
      margin-top: 16px;
      position: relative;
      overflow: hidden;
    }

    .claim-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      border-radius: inherit;
    }

    .claim-btn:not(:disabled):active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(23, 227, 196, 0.2);
    }

    .claim-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ─── Status ─────────────────────────────────────── */
    .status-box {
      font-size: 13px;
      line-height: 1.55;
      color: var(--tq-muted);
      min-height: 20px;
      margin-top: 14px;
      word-break: break-word;
      padding: 10px 14px;
      border-radius: var(--tq-radius-sm);
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.25s ease;
    }

    .status-box:not(:empty) {
      background: var(--tq-surface-2);
      border-color: var(--tq-border);
    }

    .status-box.success {
      color: var(--tq-success);
      border-color: rgba(34, 212, 122, 0.3);
      background: rgba(34, 212, 122, 0.06);
    }

    .status-box.error {
      color: var(--tq-error);
      border-color: rgba(255, 92, 92, 0.3);
      background: rgba(255, 92, 92, 0.06);
    }

    .status-box a {
      color: var(--tq-accent-2);
      text-decoration: none;
    }

    .status-box a:hover {
      text-decoration: underline;
    }

    /* ─── Footer Links ───────────────────────────────── */
    .footer-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .footer-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px 12px;
      border-radius: var(--tq-radius-sm);
      background: var(--tq-surface);
      border: 1.5px solid var(--tq-border);
      color: var(--tq-text);
      font-family: var(--tq-font);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .footer-link:hover {
      border-color: var(--tq-accent);
      background: rgba(23, 227, 196, 0.05);
    }

    .footer-link svg {
      flex-shrink: 0;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--tq-muted);
      margin-top: 20px;
      line-height: 1.7;
      opacity: 0.7;
    }

    /* ─── Spinner ────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(4, 10, 12, 0.3);
      border-top-color: #040A0C;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hidden {
      display: none !important;
    }

    /* TeQoin Wallet Bot connect button */
    .teqoin-connect-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--tq-radius-sm);
      background: linear-gradient(135deg, #0153fd 0%, #003ebd 100%);
      border: none;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.18s, transform 0.12s;
      text-decoration: none;
      margin-top: 10px;
      box-shadow: 0 2px 16px rgba(1, 83, 253, 0.25);
    }
    .teqoin-connect-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }
    .teqoin-connect-btn:active {
      transform: translateY(0);
      opacity: 1;
    }

    /* Auto-fetch status badge */
    .autofetch-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--tq-radius-sm);
      background: rgba(73, 255, 152, 0.07);
      border: 1px solid rgba(73, 255, 152, 0.25);
      font-size: 12px;
      color: var(--tq-success);
      margin-top: 8px;
    }
    .autofetch-row.visible {
      display: flex;
    }
    .autofetch-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(73, 255, 152, 0.3);
      border-top-color: var(--tq-success);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* Wallet app links fallback */
    .wallet-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .wallet-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      border-radius: var(--tq-radius-sm);
      background: var(--tq-surface-2);
      border: 1.5px solid var(--tq-border);
      color: var(--tq-text);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .wallet-link:hover {
      border-color: var(--tq-accent);
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ── Header ── -->
    <div class="header">
      <div class="logo-wrap">
        <img class="logo-img" id="logo-img" alt="TeQoin" src="/web-app-manifest-192x192.png" />
      </div>
      <div class="header-text">
        <!-- Official logoWithText asset - show if it loads, else show text h1 -->
        <img id="logo-text-img" src="/logoWithText.webp" alt="TeQoin"
          style="height:28px;width:auto;display:none;filter:brightness(0) invert(1);" />
        <h1 id="header-h1">TeQoin Faucet</h1>
        <div class="subtitle">L2 Testnet · Claim free tokens</div>
      </div>
      <div class="header-badge">Testnet</div>
    </div>

    <!-- ── Wallet Address Card ── -->
    <div class="card">
      <div class="card-label">Your Wallet Address</div>

      <div class="address-wrap">
        <input type="text" id="address-input" class="address-input" placeholder="Paste your 0x… address here"
          autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text"
          aria-label="Your wallet address" />
        <button class="paste-btn" id="paste-btn" title="Paste from clipboard" aria-label="Paste address">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
          </svg>
        </button>
      </div>
      <div id="address-hint" class="hint" role="status" aria-live="polite"></div>

      <!-- Auto-fetch from TeQoin Wallet Bot via API (Option 1 — activates when API endpoint is set) -->
      <div class="autofetch-row" id="autofetch-row">
        <span class="autofetch-spinner" id="autofetch-spinner"></span>
        <span id="autofetch-status">Looking up your TeQoin wallet…</span>
      </div>

      <!-- Option 3: Deep-link to TeQoin Wallet Bot -->
      <button class="teqoin-connect-btn" id="teqoin-wallet-btn" title="Open TeQoin Wallet Bot to copy your address">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" />
        </svg>
        Get Address from TeQoin Wallet
      </button>

      <button class="detect-btn" id="detect-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
          <path d="m4.22 4.22 2.12 2.12M17.66 17.66l2.12 2.12M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" />
        </svg>
        Detect from injected wallet
      </button>

      <div id="wallet-app-links" class="wallet-links hidden">
        <a href="#" id="metamask-link" class="wallet-link" target="_blank" rel="noopener">🦊 MetaMask</a>
        <a href="#" id="trust-link" class="wallet-link" target="_blank" rel="noopener">🛡 Trust Wallet</a>
      </div>
    </div>

    <!-- ── Claim Card ── -->
    <div class="card">
      <div class="card-label">Select Claim Mode</div>

      <div class="toggle-wrap">
        <button type="button" class="toggle-btn active" data-native="true" id="toggle-eth">
          ETH Only
        </button>
        <button type="button" class="toggle-btn" data-native="false" id="toggle-all">
          ETH + Stablecoins
        </button>
      </div>

      <!-- Token preview grid -->
      <div class="token-grid" id="token-grid"></div>

      <button class="claim-btn" id="claim-btn" disabled>
        Enter address to claim
      </button>
      <div class="status-box" id="status-box" role="status" aria-live="polite"></div>
    </div>

    <!-- ── Footer Links ── -->
    <div class="footer-links">
      <a href="https://t.me/TeQoin_Wallet_Bot/app" target="_blank" rel="noopener" class="footer-link" id="tg-bot-link">
